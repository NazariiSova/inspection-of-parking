<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Інспектор</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: #0d1117; color: #e6edf3;
  font-family: -apple-system, system-ui, sans-serif; }

/* Верхній бар — завжди видимий */
#topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 2000;
  background: #161b22; border-bottom: 2px solid #30363d;
  padding: 10px 14px; min-height: 64px;
  display: flex; align-items: center; gap: 10px;
}
#top-badge {
  flex-shrink: 0; width: 44px; height: 44px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: bold; background: #1c2128; color: #6e7681;
}
#top-name { font-size: 18px; font-weight: bold; line-height: 1.2; }
#top-sub  { font-size: 12px; color: #6e7681; margin-top: 2px; }

/* Карта — займає весь екран під топбаром */
#map {
  position: fixed;
  top: 64px; left: 0; right: 0;
  bottom: 0; /* буде змінюватись через JS */
  z-index: 1;
}

/* Нижня панель */
#bottom {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 2000;
  background: #0d1117; border-top: 2px solid #30363d;
  display: flex; flex-direction: column;
}

/* Кнопки далі/назад — тільки на вкладці маршруту */
#nav-bar {
  display: none;
  gap: 8px; padding: 10px 12px;
  background: #0d1117; border-bottom: 1px solid #30363d;
}
#nav-bar.show { display: flex; }
#btn-back {
  flex: 1; padding: 15px; font-size: 17px; font-weight: bold;
  background: #161b22; border: 1px solid #30363d; border-radius: 12px;
  color: #e6edf3; cursor: pointer;
}
#step-counter {
  flex-shrink: 0; min-width: 60px; padding: 15px 8px;
  text-align: center; font-size: 14px; font-weight: bold;
  background: #1c2128; border-radius: 12px;
}
#btn-next {
  flex: 1; padding: 15px; font-size: 17px; font-weight: bold;
  background: #1f6feb; border: none; border-radius: 12px;
  color: #fff; cursor: pointer;
}

/* Таби */
#tabs {
  display: flex; background: #161b22; border-top: 1px solid #30363d;
  flex-shrink: 0;
}
.tab {
  flex: 1; padding: 11px 2px; text-align: center; font-size: 12px;
  color: #6e7681; cursor: pointer; border-top: 2px solid transparent; margin-top: -1px;
}
.tab.on { color: #e6edf3; border-top-color: #1f6feb; }

/* Вміст вкладок */
#panels { overflow: hidden; flex-shrink: 0; }
.panel { display: none; max-height: 45vh; overflow-y: auto; padding: 10px 12px; }
.panel.on { display: block; }

/* --- Сектор --- */
#sec-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 10px;
}
.sc {
  background: #161b22; border: 2px solid #30363d; border-radius: 10px;
  padding: 10px 4px; text-align: center; cursor: pointer;
}
.sc.on { border-color: #1f6feb; background: #1c2128; }
.sc-n { font-size: 20px; font-weight: bold; }
.sc-c { font-size: 10px; color: #6e7681; margin-top: 1px; }

#search-row { display: flex; gap: 6px; margin-bottom: 8px; }
#pk-search {
  flex: 1; background: #161b22; border: 1px solid #30363d; border-radius: 8px;
  padding: 9px 10px; color: #e6edf3; font-size: 15px; outline: none;
}
#btn-all {
  background: #161b22; border: 1px solid #30363d; border-radius: 8px;
  padding: 9px 10px; color: #6e7681; font-size: 13px; cursor: pointer; white-space: nowrap;
}
.pk-row {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 10px; background: #161b22; border: 1px solid #30363d;
  border-radius: 8px; cursor: pointer; margin-bottom: 4px;
}
.pk-row.off { opacity: .35; }
.pk-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
.pk-name { flex: 1; font-size: 14px; }
.pk-spots { font-size: 12px; color: #6e7681; flex-shrink: 0; }
.pk-x { font-size: 20px; color: #6e7681; padding: 0 4px; flex-shrink: 0; }

/* --- Маршрут --- */
#btn-build {
  display: block; width: 100%; padding: 14px; font-size: 16px; font-weight: bold;
  background: #1f6feb; border: none; border-radius: 10px; color: #fff;
  cursor: pointer; margin-bottom: 8px;
}
#route-stats { font-size: 12px; color: #6e7681; margin-bottom: 8px; }
.step-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px; background: #161b22; border: 1px solid #30363d;
  border-radius: 8px; margin-bottom: 4px; cursor: pointer; opacity: .5;
}
.step-row.curr { opacity: 1; border-color: #1f6feb; background: #1c2128; }
.step-row.next { opacity: .8; }
.step-row.done { opacity: .25; }
.s-badge {
  width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: bold;
}
.s-name { flex: 1; font-size: 14px; line-height: 1.3; }
.s-sub  { font-size: 11px; color: #6e7681; margin-top: 2px; }
.s-eta  { font-size: 13px; color: #f0b429; font-weight: bold; flex-shrink: 0; }

/* --- Таймер --- */
#timer-panel { text-align: center; padding: 8px 0; }
#t-lbl { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #6e7681; }
#t-disp {
  font-size: 68px; font-weight: bold; font-variant-numeric: tabular-nums;
  color: #f0b429; letter-spacing: 2px; line-height: 1.1;
}
#t-disp.warn { color: #d29922; }
#t-disp.done { color: #3fb950; font-size: 44px; }
#t-btns { display: flex; gap: 10px; margin-top: 14px; }
.tbtn {
  flex: 1; padding: 16px; font-size: 17px; font-weight: bold;
  border: none; border-radius: 12px; cursor: pointer;
}
#t-go   { background: #1f6feb; color: #fff; }
#t-rst  { background: #161b22; border: 1px solid #30363d; color: #f85149; }

/* --- GPS --- */
#gps-near { font-size: 18px; font-weight: bold; color: #79c0ff; margin-bottom: 3px; }
#gps-meta { font-size: 13px; color: #6e7681; margin-bottom: 6px; }
#gps-dist { display: inline-block; background: #1f6feb; color: #fff; border-radius: 6px; padding: 3px 10px; font-size: 13px; font-weight: bold; margin-bottom: 10px; }
#btn-gps  { width: 100%; padding: 13px; background: #1f6feb; border: none; border-radius: 10px; color: #fff; font-size: 15px; font-weight: bold; cursor: pointer; margin-bottom: 12px; }
#btn-gps.on { background: #3fb950; }
.a-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #30363d; }
.a-row:last-child { border-bottom: none; }
.a-st { font-size: 15px; font-weight: 600; }
.a-d  { font-size: 11px; color: #6e7681; margin-top: 1px; }
.a-n  { font-size: 28px; font-weight: bold; color: #f0b429; }

/* GPS fab на карті */
#fab-gps {
  position: fixed; bottom: 0; right: 14px; z-index: 1999;
  width: 50px; height: 50px; border-radius: 50%; border: none;
  background: #1f6feb; color: #fff; font-size: 22px; cursor: pointer;
  box-shadow: 0 2px 10px rgba(0,0,0,.6);
  display: flex; align-items: center; justify-content: center;
}
#fab-gps.on { background: #3fb950; }
</style>
</head>
<body>

<!-- ТОПБАР -->
<div id="topbar">
  <div id="top-badge">🅿</div>
  <div>
    <div id="top-name">Інспектор</div>
    <div id="top-sub">Вибери сектор → Побудуй маршрут</div>
  </div>
</div>

<!-- КАРТА (завжди видима) -->
<div id="map"></div>

<!-- GPS FAB -->
<button id="fab-gps" onclick="toggleGPS()">📍</button>

<!-- НИЖНЯ ПАНЕЛЬ -->
<div id="bottom">
  <div id="nav-bar">
    <button id="btn-back" onclick="stepBack()">← Назад</button>
    <div id="step-counter">—</div>
    <button id="btn-next" onclick="stepNext()">Далі →</button>
  </div>

  <div id="tabs">
    <div class="tab on"  onclick="goTab('sector')">⚙ Сектор</div>
    <div class="tab"     onclick="goTab('route')">📋 Маршрут</div>
    <div class="tab"     onclick="goTab('timer')">⏱ Таймер</div>
    <div class="tab"     onclick="goTab('gps')">📍 Де я</div>
  </div>

  <div id="panels">

    <!-- СЕКТОР -->
    <div id="p-sector" class="panel on">
      <div id="sec-grid"></div>
      <div id="search-row">
        <input id="pk-search" placeholder="Пошук…" oninput="renderPkList()">
        <button id="btn-all" onclick="toggleAll()">Зняти все</button>
      </div>
      <div id="pk-list"></div>
    </div>

    <!-- МАРШРУТ -->
    <div id="p-route" class="panel">
      <button id="btn-build" onclick="buildRoute()">▶ Побудувати маршрут</button>
      <div id="route-stats"></div>
      <div id="route-list"></div>
    </div>

    <!-- ТАЙМЕР -->
    <div id="p-timer" class="panel">
      <div id="timer-panel">
        <div id="t-lbl">Таймер фіксації (10 хв)</div>
        <div id="t-disp">10:00</div>
        <div id="t-btns">
          <button class="tbtn" id="t-go"  onclick="timerStart()">▶ Старт</button>
          <button class="tbtn" id="t-rst" onclick="timerReset()">■ Скинути</button>
        </div>
      </div>
    </div>

    <!-- GPS -->
    <div id="p-gps" class="panel">
      <button id="btn-gps" onclick="toggleGPS()">📍 Увімкнути GPS</button>
      <div id="gps-near">GPS вимкнено</div>
      <div id="gps-meta"></div>
      <div id="gps-dist"></div>
      <div style="font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#6e7681;margin-bottom:6px">Адреси поруч</div>
      <div id="addr-list"><div style="color:#6e7681">Спочатку увімкни GPS</div></div>
    </div>

  </div>
</div>

function renderPkMarkers() {
  Object.values(pkMkrs).forEach(m => map.removeLayer(m));
  pkMkrs = {};
  const list = PARKS.filter(p => p.sec === ST.sec);
  list.forEach(p => {
    const skip = ST.skip.includes(p.id);
    const c = COLORS[p.sec] || '#6b7280';
    const sz = p.s > 50 ? 26 : p.s > 15 ? 22 : 18;
    const icon = L.divIcon({ className: '',
      html: `<div style="background:${c};color:#fff;border-radius:50%;width:${sz}px;height:${sz}px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:bold;border:2px solid rgba(255,255,255,.4);box-shadow:0 2px 6px rgba(0,0,0,.5);opacity:${skip?.3:1}">${p.s||'P'}</div>`,
      iconSize:[sz,sz], iconAnchor:[sz/2,sz/2] });
    pkMkrs[p.id] = L.marker([p.lat,p.lon], {icon})
      .bindPopup(`<div style="font-family:system-ui;min-width:150px"><b>${p.n}</b><br><span style="color:#888">Сектор ${p.sec}${p.s?` · ${p.s} м.`:''}</span><br><br><button onclick="toggleSkip('${p.id}')" style="width:100%;padding:8px;border:none;border-radius:8px;cursor:pointer;background:${skip?'#22c55e':'#ef4444'};color:#fff;font-size:14px">${skip?'✓ Включити':'✕ Прибрати'}</button></div>`)
      .addTo(map);
  });
  if (list.length) map.fitBounds(L.latLngBounds(list.map(p=>[p.lat,p.lon])), {padding:[40,40]});
}

function toggleSkip(id) {
  ST.skip = ST.skip.includes(id) ? ST.skip.filter(x=>x!==id) : [...ST.skip, id];
  save(); map.closePopup(); renderPkMarkers(); renderPkList();
}

function drawRouteLines() {
  routeLines.forEach(l => map.removeLayer(l)); routeLines = [];
  if (!steps.length) return;
  const prev = steps[cur-1] || null;
  const curr = steps[cur];
  const next = steps[cur+1] || null;
  const after = steps[cur+2] || null;
  if (prev) {
    routeLines.push(L.polyline([[prev.lat,prev.lon],[curr.lat,curr.lon]],
      {color:'#484f58', weight:3, opacity:.4}).addTo(map));
  }
  if (next) {
    const vel = ['vel','walk'].includes(next.type);
    routeLines.push(L.polyline([[curr.lat,curr.lon],[next.lat,next.lon]],
      {color: vel ? '#a371f7' : '#1f6feb', weight:5, opacity:1}).addTo(map));
  }
  if (next && after) {
    routeLines.push(L.polyline([[next.lat,next.lon],[after.lat,after.lon]],
      {color:'#30363d', weight:2, opacity:.5, dashArray:'6,4'}).addTo(map));
  }
  if (next) map.fitBounds([[curr.lat,curr.lon],[next.lat,next.lon]], {padding:[60,80]});
  else map.setView([curr.lat,curr.lon], 17);
}

// ═══════════════════════════════════════
// МАРШРУТ
// ═══════════════════════════════════════
function dm(a,b,c,d){const R=6371000,dl=(c-a)*Math.PI/180,dn=(d-b)*Math.PI/180;return R*2*Math.asin(Math.sqrt(Math.sin(dl/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dn/2)**2));}
function wm(m){return m/(WALK*1000/60);}
function bm(m){return m/(BIKE*1000/60);}
function cc(cl){return[cl.reduce((s,p)=>s+p.lat,0)/cl.length, cl.reduce((s,p)=>s+p.lon,0)/cl.length];}
function fm(m){return m<1000?`${Math.round(m)}м`:`${(m/1000).toFixed(1)}км`;}

function buildRoute() {
  const active = PARKS.filter(p => p.sec===ST.sec && !ST.skip.includes(p.id));
  if (!active.length) { alert('Немає активних парковок.'); return; }

  // Кластеризація
  const used = new Set(), clusters = [];
  [...active].sort((a,b)=>b.s-a.s).forEach(p => {
    if (used.has(p.id)) return;
    const cl = [p]; used.add(p.id);
    active.forEach(q => { if (!used.has(q.id) && dm(p.lat,p.lon,q.lat,q.lon)<=PAIR_R) { cl.push(q); used.add(q.id); }});
    clusters.push(cl);
  });

  // Nearest neighbor
  const ord = [], cu = new Set();
  let st = clusters.reduce((a,b) => b.reduce((s,p)=>s+p.s,0)>a.reduce((s,p)=>s+p.s,0)?b:a);
  ord.push(st); cu.add(clusters.indexOf(st));
  while (ord.length < clusters.length) {
    const lc = cc(ord[ord.length-1]); let bi=-1, bd=Infinity;
    clusters.forEach((cl,i) => { if(cu.has(i))return; const c=cc(cl),d=dm(lc[0],lc[1],c[0],c[1]); if(d<bd){bd=d;bi=i;} });
    ord.push(clusters[bi]); cu.add(bi);
  }

  // Генерація кроків
  steps = []; let t = 0;
  ord.forEach((cl, ci) => {
    if (ci > 0) {
      const d = dm(...cc(ord[ci-1]), ...cc(cl));
      const vel = d > BIKE_T;
      t += vel ? bm(d) : wm(d);
      steps.push({type: vel?'vel':'walk', name: vel?'🚲 Їдеш велосипедом':'🚶 Йдеш пішки', sub: fm(d), lat:cc(cl)[0], lon:cc(cl)[1], eta:t});
    }
    cl.forEach((p, pi) => {
      if (pi > 0) t += wm(dm(cl[pi-1].lat,cl[pi-1].lon,p.lat,p.lon));
      steps.push({type:'fik', name:p.n, sub:`${p.s||'?'} місць · ФІКСАЦІЯ`, lat:p.lat, lon:p.lon, eta:t});
    });
    t += WAIT;
    steps.push({type:'wait', name:'Чекаєш 10 хв', sub:'Запусти таймер', lat:cc(cl)[0], lon:cc(cl)[1], eta:t});
    [...cl].reverse().forEach((p, pi, arr) => {
      if (pi > 0) t += wm(dm(arr[pi-1].lat,arr[pi-1].lon,p.lat,p.lon));
      steps.push({type:'sht', name:p.n, sub:'ШТРАФ', lat:p.lat, lon:p.lon, eta:t});
    });
  });

  cur = 0;
  const shts = steps.filter(s=>s.type==='sht').length;
  document.getElementById('route-stats').textContent =
    `${shts} потенційних штрафів · ${Math.round(t)} хв · ${clusters.length} кластерів`;

  renderSteps();
  updateTopbar(steps[0]);
  drawRouteLines();
  document.getElementById('nav-bar').classList.add('show');
  goTab('route');
}

const BCFG = {
  fik:  {bg:'#d29922', fg:'#000', lbl:'ФІК'},
  sht:  {bg:'#3fb950', fg:'#000', lbl:'ШТР'},
  vel:  {bg:'#8957e5', fg:'#fff', lbl:'ВЕЛ'},
  walk: {bg:'#8957e5', fg:'#fff', lbl:'🚶'},
  wait: {bg:'#30363d', fg:'#6e7681', lbl:'⏱'},
};

function renderSteps() {
  let n = 0;
  document.getElementById('route-list').innerHTML = steps.map((s,i) => {
    const b = BCFG[s.type] || {bg:'#333',fg:'#fff',lbl:'?'};
    const num = ['fik','sht','vel','walk'].includes(s.type) ? ++n : b.lbl;
    let cls = 'step-row';
    if (i < cur) cls += ' done';
    else if (i === cur) cls += ' curr';
    else if (i === cur+1) cls += ' next';
    return `<div class="${cls}" onclick="jumpTo(${i})">
      <div class="s-badge" style="background:${b.bg};color:${b.fg}">${num}</div>
      <div style="flex:1;min-width:0">
        <div class="s-name">${s.name}</div>
        ${s.sub?`<div class="s-sub">${s.sub}</div>`:''}
      </div>
      <div class="s-eta">${Math.floor(s.eta)}хв</div>
    </div>`;
  }).join('');
}

function updateTopbar(s) {
  if (!s) {
    document.getElementById('top-badge').textContent = '🅿';
    document.getElementById('top-badge').style.cssText = '';
    document.getElementById('top-name').textContent = 'Інспектор';
    document.getElementById('top-sub').textContent = 'Вибери сектор → Побудуй маршрут';
    return;
  }
  const b = BCFG[s.type] || {bg:'#1c2128',fg:'#6e7681',lbl:'?'};
  const badge = document.getElementById('top-badge');
  badge.textContent = b.lbl; badge.style.background = b.bg; badge.style.color = b.fg;
  document.getElementById('top-name').textContent = s.name;
  document.getElementById('top-sub').textContent = (s.sub||'') + ' · +' + Math.floor(s.eta) + 'хв';
}

function updateStepUI() {
  const s = steps[cur];
  document.getElementById('step-counter').textContent = `${cur+1}/${steps.length}`;
  updateTopbar(s);
  document.querySelectorAll('.step-row').forEach((el,i) => {
    el.className = 'step-row' + (i<cur?' done':i===cur?' curr':i===cur+1?' next':'');
    if (i===cur) el.scrollIntoView({block:'nearest',behavior:'smooth'});
  });
  drawRouteLines();
}

function stepNext() { if (cur < steps.length-1) { cur++; updateStepUI(); } }
function stepBack() { if (cur > 0) { cur--; updateStepUI(); } }
function jumpTo(i)  { cur = i; updateStepUI(); }

let watching = false, watchId = null, curPos = null, lastAddr = 0;

function toggleGPS() {
  watching ? stopGPS() : startGPS();
}
function startGPS() {
  if (!navigator.geolocation) { alert('GPS недоступний'); return; }
  watching = true;
  document.getElementById('fab-gps').classList.add('on');
  document.getElementById('btn-gps').classList.add('on');
  document.getElementById('btn-gps').textContent = '📍 GPS увімкнено';
  watchId = navigator.geolocation.watchPosition(pos => {
    curPos = {lat: pos.coords.latitude, lon: pos.coords.longitude};
    if (!userMkr) {
      userMkr = L.marker([curPos.lat,curPos.lon], {icon: L.divIcon({className:'',
        html:'<div style="width:14px;height:14px;background:#1f6feb;border-radius:50%;border:3px solid #fff;box-shadow:0 0 0 2px #1f6feb"></div>',
        iconSize:[14,14],iconAnchor:[7,7]}), zIndexOffset:1000}).addTo(map);
    } else userMkr.setLatLng([curPos.lat,curPos.lon]);
    updateGpsPanel();
  }, ()=>{}, {enableHighAccuracy:true, maximumAge:3000});
}
function stopGPS() {
  watching = false;
  document.getElementById('fab-gps').classList.remove('on');
  document.getElementById('btn-gps').classList.remove('on');
  document.getElementById('btn-gps').textContent = '📍 Увімкнути GPS';
  if (watchId) { navigator.geolocation.clearWatch(watchId); watchId=null; }
}
function updateGpsPanel() {
  if (!curPos) return;
  const near = PARKS.map(p=>({...p,d:dm(curPos.lat,curPos.lon,p.lat,p.lon)})).sort((a,b)=>a.d-b.d)[0];
  document.getElementById('gps-near').textContent = near.n;
  document.getElementById('gps-meta').textContent = `Сектор ${near.sec}${near.s?` · ${near.s} місць`:''}`;
  document.getElementById('gps-dist').textContent = fm(near.d);
  const now = Date.now();
  if (now - lastAddr > 30000) { lastAddr=now; fetchAddrs(curPos.lat,curPos.lon); }
}
async function fetchAddrs(lat,lon) {
  const R=.0008, b=`${lat-R},${lon-R},${lat+R},${lon+R}`;
  const q=`[out:json][timeout:6];(node["addr:housenumber"](${b});way["addr:housenumber"](${b}););out center 20;`;
  const el = document.getElementById('addr-list');
  try {
    const data = await(await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(q)}`)).json();
    const raw=[]; const seen=new Set();
    data.elements.forEach(e=>{
      const t=e.tags||{},elat=e.lat||(e.center?.lat),elon=e.lon||(e.center?.lon);
      if(!elat||!t['addr:housenumber'])return;
      raw.push({st:t['addr:street']||'?', n:t['addr:housenumber'], d:dm(lat,lon,elat,elon)});
    });
    raw.sort((a,b)=>a.d-b.d);
    const uniq = raw.filter(a=>{ const k=a.st+a.n; if(seen.has(k))return false; seen.add(k); return true; }).slice(0,8);
    el.innerHTML = uniq.length ? uniq.map(a=>`
      <div class="a-row">
        <div><div class="a-st">${a.st}</div><div class="a-d">${fm(a.d)}</div></div>
        <div class="a-n">${a.n}</div>
      </div>`).join('') : '<div style="color:#6e7681">Будинків не знайдено</div>';
  } catch { el.innerHTML = '<div style="color:#f85149">⚠ Немає інтернету</div>'; }
}

// ═══════════════════════════════════════
// ТАЙМЕР
// ═══════════════════════════════════════
let tSec=600, tInt=null, tOn=false;
function tf(s){return`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;}
function tRender(){
  const el=document.getElementById('t-disp');
  el.textContent = tSec<=0?'✓ ШТРАФ':tf(tSec);
  el.className = tSec<=0?'done':tSec<=120?'warn':'';
}
function timerStart(){
  if(tOn)return; tSec=600; tOn=true; tRender();
  tInt=setInterval(()=>{ if(tSec>0){tSec--;tRender();}else{clearInterval(tInt);tOn=false;if(navigator.vibrate)navigator.vibrate([400,100,400,100,400]);} },1000);
}
function timerReset(){ clearInterval(tInt); tOn=false; tSec=600; tRender(); }

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
renderSecGrid();
renderPkList();
renderPkMarkers();
adjustMapBottom();
window.addEventListener('resize', adjustMapBottom);
</script>
